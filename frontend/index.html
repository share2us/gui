<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <!-- Strict CSP: the app is fully self-contained (no remote resources). This
         is the backstop that keeps any HTML-injection from escalating to script
         execution in the privileged webview. script-src 'self' blocks injected
         <script> AND inline event handlers (onerror=…); style-src allows inline
         style attributes the UI uses. No external origins are permitted. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"/>
    <title>Share2Us</title>
</head>
<body>
<div id="app"></div>
<script src="./src/main.ts" type="module"></script>
</body>
</html>
